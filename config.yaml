version: 1.2.8

cache: false

fileStrategy: "local"

# filteredTools: []

# includedTools: web_search

secureImageLinks: false

imageOutputType: "png"

# ocr:

webSearch:
  # Search Provider Configuration
  serperApiKey: "${SERPER_API_KEY}"
  searchProvider: "serper" # Options: "serper", "searxng"
  # Scraper Configuration
  scraperType: "serper" # Options: "firecrawl", "serper"
  # Reranker Configuration
  # jinaApiKey: "${JINA_API_KEY}"
  cohereApiKey: "${COHERE_API_KEY}"
  rerankerType: "cohere" # Options: "jina", "cohere"
  # General Settings
  scraperTimeout: 7500 # Timeout in milliseconds for scraper requests (default: 7500)
  safeSearch: 1 # Options: 0 (OFF), 1 (MODERATE - default), 2 (STRICT)

# fileConfig:

# rateLimits:

memory:
  disabled: true

# actions:

interface:
  mcpServers:
    placeholder: "MCP Servers"
  privacyPolicy:
    externalUrl: "https://cattus.ai/privacy"
    openNewTab: true
  termsOfService:
    externalUrl: "https://cattus.ai/terms"
    openNewTab: true
  multiConvo: true
  sidePanel: true
  agents: true
  bookmarks: true
  customWelcome: "Hey {{user.name}}! Welcome to Cattus.ai"
  webSearch: false
  modelSelect: false
  prompts: false
  parameters: false
  presets: false
  runCode: false
  fileSearch: false
  fileCitations: false

# modelSpecs:

endpoints:
  agents:
    capabilities:
      - "execute_code"
      - "file_search"
      - "actions"
      - "tools"
      - "ocr"
      - "chain"
      - "web_search"

  custom:
    - name: "title-endpoint"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "${OPENROUTER_GATEWAY_URL}"
      models:
        default:
          - openai/gpt-4o-mini
        fetch: false

    - name: "openrouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "${OPENROUTER_GATEWAY_URL}"
      models:
        default:
          - openai/gpt-5
          - openai/gpt-5-chat
          - openai/chatgpt-4o-latest
          - anthropic/claude-sonnet-4
          - mistralai/mistral-medium-3.1
          - mistralai/codestral-2508
          - perplexity/sonar-deep-research
          - perplexity/sonar-pro
        fetch: false
      titleConvo: true
      titleEndpoint: "title-endpoint"
      dropParams: ["stop"]
      summarize: false
      forcePrompt: false


modelSpecs:
  enforce: true
  prioritize: true
  list:
    - name: "GPT-5 Image"
      label: "GPT-5 Image"
      default: true
      description: "Multi-capable AI assistant with image generation"
      iconURL: "https://img.icons8.com/fluency/96/chatgpt--v2.png"
      preset:
        endpoint: "agents"
        agent_id: "agent_NWI3ttV-oA4XUZZdinIAI"
        modelLabel: "GPT-5 Image"
        tools: 
          - "image_gen_oai"
    - name: "GPT-5"
      label: "GPT-5"
      iconURL: "https://img.icons8.com/fluency/96/chatgpt--v2.png"
      preset:
        endpoint: "openrouter"
        model: "openai/gpt-5-chat-latest"
        modelLabel: "GPT-5"
    - name: "GPT-5 Thinking"
      label: "GPT-5 Thinking"
      iconURL: "https://img.icons8.com/fluency/96/chatgpt--v2.png"
      preset:
        endpoint: "openrouter"
        model: "openai/gpt-5"
        modelLabel: "GPT-5 Thinking"
        # reasoning_effort: "medium"
        # reasoning_summary: detailed
    - name: "GPT-4o"
      label: "GPT-4o"
      iconURL: "https://img.icons8.com/fluency/96/chatgpt--v2.png"
      preset:
        endpoint: "openrouter"
        model: "openai/chatgpt-4o-latest"
        modelLabel: "GPT-4o"
    - name: "Claude Sonnet 4"
      label: "Claude Sonnet 4"
      iconURL: "https://img.icons8.com/fluency/96/claude.png"
      preset:
        endpoint: "openrouter"
        model: "anthropic/claude-sonnet-4"
        modelLabel: "Claude Sonnet 4"
    - name: "Mistral Medium"
      label: "Mistral Medium"
      iconURL: "https://unpkg.com/@lobehub/icons-static-svg@1.66.0/icons/mistral-color.svg"
      preset:
        endpoint: "openrouter"
        model: "mistralai/mistral-medium-3.1"
        modelLabel: "Mistral Medium"
    - name: "Mistral Codestral"
      label: "Mistral Codestral"
      iconURL: "https://unpkg.com/@lobehub/icons-static-svg@1.66.0/icons/mistral-color.svg"
      preset:
        endpoint: "openrouter"
        model: "mistralai/codestral-2508"
        modelLabel: "Mistral Codestral"
    - name: "Sonar Deep Research"
      label: "Sonar Deep Research"
      iconURL: "https://unpkg.com/@lobehub/icons-static-svg@latest/icons/perplexity-color.svg"
      preset:
        endpoint: "openrouter"
        model: "perplexity/sonar-deep-research"
        temperature: 0.3
        promptPrefix: "Additional Rules: 1. Always print the full URL in this format (URL)[URL] alwayse add a white space at the satart and the end of the citation and a comma between succesive citations, instead of just the Citation Number; 2. Ensure responses are concise and relevant; 3. Always cite the sources of your web search"
        modelLabel: "Sonar Deep Research"
    - name: "Sonar Pro"
      label: "Sonar Pro"
      iconURL: "https://unpkg.com/@lobehub/icons-static-svg@latest/icons/perplexity-color.svg"
      preset:
        endpoint: "openrouter"
        model: "perplexity/sonar-pro"
        temperature: 0.3
        promptPrefix: "Additional Rules: 1. Always print the full URL in this format (URL)[URL] alwayse add a white space at the satart and the end of the citation and a comma between succesive citations, instead of just the Citation Number; 2. Ensure responses are concise and relevant; 3. Always cite the sources of your web search"
        modelLabel: "Sonar Pro"
# mcpServers:
